name: CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: finance-god-production
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend
        working-directory: backend
        run: pip install -r requirements.txt && pip install -e ".[dev]"

      - name: Test backend
        working-directory: backend
        run: timeout 60s pytest tests/unit -q

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build and test frontend
        working-directory: frontend
        run: npm ci && npm test && npm run build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST_KEY: ${{ secrets.DEPLOY_HOST_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$DEPLOY_HOST_KEY" > ~/.ssh/known_hosts

      - name: Sync release
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "sudo mkdir -p /opt/finance-god && sudo chown '$DEPLOY_USER:$DEPLOY_USER' /opt/finance-god"
          rsync -az --delete \
            --exclude='.git/' \
            --exclude='deploy/.env.production' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ "$DEPLOY_USER@$DEPLOY_HOST:/opt/finance-god/"

      - name: Deploy and verify
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "chmod +x /opt/finance-god/deploy/remote-deploy.sh && /opt/finance-god/deploy/remote-deploy.sh"
