name: finance-god

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: finance_god
      POSTGRES_USER: finance_god
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance_god -d finance_god"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ../backend
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql+asyncpg://finance_god:${POSTGRES_PASSWORD}@db:5432/finance_god
      DATABASE_URL_SYNC: postgresql+psycopg2://finance_god:${POSTGRES_PASSWORD}@db:5432/finance_god
      FINANCE_GOD_DATABASE_URL: postgresql+psycopg2://finance_god:${POSTGRES_PASSWORD}@db:5432/finance_god
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_WORKBENCH_ORIGIN: ${VITE_WORKBENCH_ORIGIN:-}
    restart: unless-stopped
    ports:
      - "127.0.0.1:18080:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  postgres_data:
