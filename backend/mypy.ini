[mypy]
strict = True
explicit_package_bases = True
files =
    finance_god/domain/accounts.py,
    finance_god/domain/ledger.py,
    finance_god/domain/simulation_rules.py,
    finance_god/domain/errors.py,
    finance_god/application,
    finance_god/infrastructure/persistence,
    tests/ledger

[mypy-research_runtime.*]
follow_imports = skip
ignore_missing_imports = True
