[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "verifolio-research-runtime"
version = "0.2.0"
description = "A unified, profile-gated multi-agent runtime for VeriFolio"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "langgraph>=1.0,<2",
    "openai>=2.0,<3",
    "pydantic>=2.0,<3",
    "python-dotenv>=1.0,<2",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0,<10",
    "ruff>=0.15,<1",
]
panda = [
    "panda_data>=0.0.9",
]
mcp = [
    "mcp>=1.27,<2",
]
finrobot = [
    "numpy>=1.24,<2",
    "pandas>=2.0,<3",
    "requests>=2.28,<3",
    "tabulate>=0.9,<1",
    "yfinance>=0.2,<1",
]

[project.scripts]
verifolio-agent = "research_runtime.cli:main"
verifolio-agent-catalog = "research_runtime.catalog:main"
verifolio-agent-mcp = "research_runtime.mcp_server:main"

[tool.setuptools.package-data]
research_runtime = ["py.typed"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra --strict-markers"

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
